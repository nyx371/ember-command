<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Ember Command</title>
    <link rel="stylesheet" href="styles.css?v=20260719-costs1" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="resources" id="stores" aria-label="resources"></div>
        <details class="menu">
          <summary aria-label="menu">☰</summary>
          <div class="menu-panel">
            <strong id="phase">economy</strong>
            <p>Tap a structure or unit in the world. Commands appear inside the field.</p>
            <div id="log" class="menu-log"></div>
          </div>
        </details>
      </header>

      <section class="world panel" aria-label="world">
        <div class="world-head">
          <span>EMBER COMMAND</span>
          <strong id="selected-label">TOWN HALL</strong>
        </div>
        <div id="world" class="world-canvas"></div>
        <div id="orders" class="command-bar" aria-label="commands"></div>
      </section>
    </main>

    <script src="app.js?v=20260719-costs1"></script>
  </body>
</html>
