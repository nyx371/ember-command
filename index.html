<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Ember Command</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="mark">EMBER COMMAND</p>
          <h1 id="headline">DARK</h1>
        </div>
        <details class="menu">
          <summary aria-label="menu">☰</summary>
          <div class="menu-panel">
            <strong id="phase">Dark room</strong>
            <p>∴ ember · ╱ wood · ○ food · ∆ threat</p>
            <p>⌖ scout · ∿ forage · † guard · ⌁ trap · ⌂ hut · ⌘ command</p>
          </div>
        </details>
      </header>

      <section class="stats" aria-label="stores and camp">
        <div id="stores" class="stat-grid"></div>
        <div id="camp" class="stat-grid"></div>
      </section>

      <section class="orders panel" aria-label="orders">
        <div id="orders" class="order-grid"></div>
      </section>

      <section class="log panel" aria-label="signs">
        <div class="panel-title">SIGNS</div>
        <div id="log" class="log-lines"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
