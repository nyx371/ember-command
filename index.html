<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Ember Command</title>
    <link rel="stylesheet" href="styles.css?v=20260718-icons2" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="mark">EMBER COMMAND</p>
          <h1 id="headline">WAR</h1>
        </div>
        <details class="menu">
          <summary aria-label="menu">☰</summary>
          <div class="menu-panel">
            <strong id="phase">economy</strong>
            <p>cut PNG icons from 10 × 18 sheet</p>
            <p>gold · lumber · oil · supply · workers · army · structures · enemy</p>
          </div>
        </details>
      </header>

      <section class="stats" aria-label="resources and forces">
        <div id="stores" class="stat-grid"></div>
        <div id="camp" class="stat-grid"></div>
      </section>

      <section class="orders panel" aria-label="orders">
        <div id="orders" class="order-grid"></div>
      </section>

      <section class="log panel" aria-label="log">
        <div class="panel-title">LOG</div>
        <div id="log" class="log-lines"></div>
      </section>
    </main>

    <script src="app.js?v=20260718-icons2"></script>
  </body>
</html>
